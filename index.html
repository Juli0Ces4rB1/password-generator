<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Senhas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="orb-mid" aria-hidden="true"></div>
  <div class="page">
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="28" height="28" rx="8" fill="#2563EB"/>
          <circle cx="10" cy="14" r="3" fill="white"/>
          <rect x="13" y="13" width="9" height="2" rx="1" fill="white"/>
          <rect x="19" y="11" width="2" height="2" rx="0.5" fill="white"/>
          <rect x="16" y="15" width="2" height="2" rx="0.5" fill="white"/>
        </svg>
        <span class="logo-text">Password</span>
      </div>

    </header>

    <main class="main">
      <div class="hero">
        <h1 class="title">Gerador de senhas</h1>
        <p class="subtitle">Crie senhas fortes e seguras em segundos</p>
      </div>

      <div class="card">
        <div class="password-display">
          <span class="password-text" id="pwd" aria-live="polite" aria-label="Senha gerada">—</span>
          <button class="icon-btn" id="copyBtn" onclick="copyPwd()" aria-label="Copiar senha" title="Copiar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button class="icon-btn" onclick="generate()" aria-label="Gerar nova senha" title="Nova senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
          </button>
        </div>

        <div class="strength-section">
          <div class="strength-bar" role="progressbar" aria-label="Força da senha" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="strengthBar">
            <div class="strength-fill" id="sfill"></div>
          </div>
          <span class="strength-label" id="slabel">Gere uma senha para ver a força</span>
        </div>

        <div class="options">
          <div class="option-group">
            <label class="option-label-main" for="lenRange">Comprimento</label>
            <div class="range-row">
              <input type="range" min="6" max="64" value="16" step="1" id="lenRange"
                     oninput="document.getElementById('lenVal').textContent=this.value"
                     aria-label="Comprimento da senha" />
              <span class="len-badge" id="lenVal">16</span>
            </div>
          </div>

          <fieldset class="checkboxes">
            <legend class="sr-only">Tipos de caracteres</legend>
            <label class="check-row">
              <input type="checkbox" id="optUpper" checked />
              <span class="check-info">
                <span class="check-name">Maiúsculas</span>
                <span class="check-sub">A – Z</span>
              </span>
            </label>
            <label class="check-row">
              <input type="checkbox" id="optLower" checked />
              <span class="check-info">
                <span class="check-name">Minúsculas</span>
                <span class="check-sub">a – z</span>
              </span>
            </label>
            <label class="check-row">
              <input type="checkbox" id="optNum" checked />
              <span class="check-info">
                <span class="check-name">Números</span>
                <span class="check-sub">0 – 9</span>
              </span>
            </label>
            <label class="check-row">
              <input type="checkbox" id="optSym" />
              <span class="check-info">
                <span class="check-name">Símbolos</span>
                <span class="check-sub">! @ # $ % ^ & *</span>
              </span>
            </label>
          </fieldset>
        </div>

        <button class="generate-btn" onclick="generate()">Gerar senha</button>
      </div>

      <p class="toast" id="toast" role="status" aria-live="polite">Senha copiada!</p>
    </main>

    <footer class="footer">
      <p>Gerado localmente no seu navegador — nenhuma senha é enviada a servidores.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
